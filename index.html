<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown — November 30, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0e1a;
    --bg-2: #10142400;
    --ivory: #f3efe7;
    --gold: #caa057;
    --violet: #5a5f92;
    --rose: #d99177;
    --dim: #8b8fa8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    overflow:hidden;
  }

  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Starfield */
  #stars{
    position:fixed;
    inset:0;
    z-index:0;
  }

  /* Orbit signature element */
  .orbit-wrap{
    position:absolute;
    top:50%;
    left:50%;
    width:min(78vw, 78vh, 900px);
    height:min(78vw, 78vh, 900px);
    transform:translate(-50%,-50%);
    z-index:1;
    pointer-events:none;
  }

  .orbit-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1px solid rgba(202,160,87,0.18);
  }

  .orbit-ring.inner{
    inset:6%;
    border-color: rgba(90,95,146,0.22);
  }

  .orbit-dot{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 12px 2px rgba(202,160,87,0.7);
    top:50%;
    left:50%;
    transform-origin: 0 0;
  }

  main{
    position:relative;
    z-index:2;
    text-align:center;
    padding: 2rem;
    max-width: 900px;
  }

  .eyebrow{
    font-family:'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 1.4rem;
  }

  .eyebrow .dot{
    display:inline-block;
    width:5px; height:5px;
    background: var(--rose);
    border-radius:50%;
    margin: 0 0.6em;
    transform: translateY(-2px);
  }

  .target-date{
    font-family:'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--ivory);
    margin-bottom: 3rem;
    letter-spacing: 0.01em;
  }

  .target-date .accent{
    color: var(--gold);
    font-style: normal;
  }

  .units{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: clamp(0.6rem, 2.4vw, 2.2rem);
    flex-wrap: wrap;
  }

  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width: 4.6rem;
  }

  .unit .value{
    font-family:'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(2.6rem, 8vw, 5.2rem);
    line-height:1;
    font-variant-numeric: tabular-nums;
    color: var(--ivory);
  }

  .unit .label{
    margin-top: 0.9rem;
    font-size: 0.68rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .sep{
    font-family:'Fraunces', serif;
    font-weight:300;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--violet);
    transform: translateY(-0.6rem);
    opacity:0.6;
  }

  footer{
    margin-top: 3.4rem;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--dim);
  }

  .arrived{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--gold);
  }

  @media (max-width: 480px){
    .units{ gap: 0.8rem; }
    .sep{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .orbit-dot, #stars canvas{ animation: none !important; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="orbit-wrap" aria-hidden="true">
  <div class="orbit-ring"></div>
  <div class="orbit-ring inner"></div>
  <div class="orbit-dot" id="orbitDot"></div>
</div>

<main>
  <div class="eyebrow">Counting the days<span class="dot"></span>Until</div>
  <div class="target-date">The day arrives <span class="accent">November 30, 2026</span></div>

  <div class="units" id="units">
    <div class="unit">
      <div class="value" id="days">00</div>
      <div class="label">Days</div>
    </div>
    <div class="sep">·</div>
    <div class="unit">
      <div class="value" id="hours">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="sep">·</div>
    <div class="unit">
      <div class="value" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="sep">·</div>
    <div class="unit">
      <div class="value" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <footer id="footerNote">Local time · updates every second</footer>
</main>

<script>
  // ---- Starfield ----
  const starsContainer = document.getElementById('stars');
  const canvas = document.createElement('canvas');
  starsContainer.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    stars = Array.from({length: count}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2,
      baseAlpha: Math.random() * 0.5 + 0.15,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.015 + 0.004
    }));
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function drawStars(t){
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = '#f3efe7';
    for(const s of stars){
      const twinkle = reduceMotion ? s.baseAlpha : s.baseAlpha + Math.sin(t * s.speed + s.phase) * 0.18;
      ctx.globalAlpha = Math.max(0, Math.min(1, twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if(!reduceMotion){
      requestAnimationFrame(drawStars);
    }
  }

  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', initStars);

  // ---- Countdown ----
  const target = new Date('2026-11-30T00:00:00');
  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const unitsEl = document.getElementById('units');
  const footerNote = document.getElementById('footerNote');
  const orbitDot = document.getElementById('orbitDot');

  // For orbit progress: measure from "now the page was first loaded 365 days prior" isn't meaningful,
  // so instead orbit represents the fraction of the current day elapsed — a small ambient signature, not a data label.
  function pad(n){ return String(n).padStart(2,'0'); }

  function update(){
    const now = new Date();
    const diff = target - now;

    if(diff <= 0){
      unitsEl.style.display = 'none';
      footerNote.innerHTML = '<span class="arrived">The day has arrived.</span>';
      orbitDot.style.display = 'none';
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    daysEl.textContent = days;
    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);

    // orbit dot: slow sweep tied to seconds-within-day, purely ambient
    const dayFraction = (now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds()) / 86400;
    const angle = dayFraction * Math.PI * 2 - Math.PI/2;
    const radius = orbitDot.parentElement.offsetWidth / 2;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    orbitDot.style.transform = `translate(${x}px, ${y}px)`;
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
